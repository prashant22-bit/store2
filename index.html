<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>

    <style>
        
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        header {
            background: #111111;
            color: rgb(255, 255, 255);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: cyan;
        }

        .hero {
            background: lightgray;
            padding: 50px;
            text-align: center;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .product {
            width: 200px;
            margin: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
            border-radius: 10px;
        }

        .product img {
            width: 100%;
        }

        .product:hover {
            background: #f0f0f0;
        }

        button {
            padding: 10px;
            background: black;
            color: white;
            border: none;
        }

        button:hover {
            background: cyan;
            color: black;
        }

        form {
            text-align: center;
            padding: 20px;
        }

        input, textarea {
            width: 200px;
            padding: 10px;
            margin: 5px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Store</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#shop">Shop</a>
        <a href="#product">Product</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!--home-->>
<section id="home" class="hero">
    <h2>Welcome to My Store</h2>
    <p>Original products at low price</p>
</section>

<!-- SHOP -->
<section id="shop">
    <h2 style="text-align:center;">Shop</h2>

    <div class="products">
        <div class="product">
            <img src="https://imgs.search.brave.com/LnJpaYWDoU-7-UrxR6VnqHZjDd6I4Fkl2lUuice7UaA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9jZG4u/cGl4YWJheS5jb20v/cGhvdG8vMjAxNi8x/Mi8zMC8xNy81NC9t/b3RvcmN5Y2xlLTE5/NDExNjNfMTI4MC5q/cGc">
            <h3>Product 1</h3>
            <p>$12</p>
            <button><i class="fa fa-shopping-cart"></i> Buy</button>
        </div>

        <div class="product">
            <img src="https://imgs.search.brave.com/NNR1yyMc456-C_chlaDxLmRZU4gJdHh3-L6kCfomAKc/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMudHJhY3Rvcmp1/bmN0aW9uLmNvbS8z/X1B1bHNhcl8yMjBf/Rl84YzQ0Y2YxMzAx/LnBuZz9mb3JtYXQ9/d2VicCZxdWFsaXR5/PTQw">
            <h3>Product 2</h3>
            <p>$18</p>
            <button><i class="fa fa-shopping-cart"></i> Buy</button>
        </div>
    </div>
</section>

<!-- PRODUCT DETAIL -->
<section id="product" style="text-align:center; padding:20px;">
    <h2>Product Detail</h2>

    <p>This is a product description.</p>
    
</section>

<!-- CONTACT -->
<section id="contact">
    <h2 style="text-align:center;">Contact</h2>

    <form>
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button>Send</button>
    </form>
</section>

<footer>
    <p>2026 My Store</p>
</footer>
</body>
</html>
